<!-- /membership/manage/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Notifications • Astral Forge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0b0b0d;--text:rgba(255,255,255,.92);--muted:rgba(255,255,255,.72);--border:rgba(255,255,255,.10);--gold:#b99054;}
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:radial-gradient(1000px 540px at 20% 10%, rgba(185,144,84,.10), transparent 55%), var(--bg);color:var(--text);}
    .wrap{max-width:980px;margin:0 auto;padding:50px 18px;}
    .card{border:1px solid var(--border);border-radius:18px;background:rgba(0,0,0,.35);box-shadow:0 18px 60px rgba(0,0,0,.35);padding:22px;}
    h1{margin:0 0 8px;font-family:Georgia,serif;font-size:30px}
    p{margin:0 0 12px;color:var(--muted);line-height:1.8}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}
    @media(max-width:860px){.row{grid-template-columns:1fr}}
    .panel{border:1px solid rgba(255,255,255,.10);border-radius:14px;background:rgba(0,0,0,.22);padding:14px}
    label{display:block;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.72);margin:10px 0 8px}
    .toggle{display:flex;gap:10px;align-items:flex-start;padding:10px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.04);margin:8px 0}
    .toggle input{margin-top:3px}
    select{width:100%;padding:10px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.22);color:var(--text);outline:none}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
    .btn{appearance:none;border:1px solid rgba(255,255,255,.16);background:rgba(0,0,0,.20);color:var(--text);padding:10px 12px;border-radius:12px;font-size:13px;cursor:pointer;transition:.18s;text-decoration:none;font-weight:700}
    .btn:hover{background:rgba(255,255,255,.06)}
    .btn.gold{border-color:rgba(185,144,84,.55);background:linear-gradient(135deg, rgba(185,144,84,.20), rgba(0,0,0,.10))}
    .btn.danger{border-color:rgba(255,90,90,.45)}
    .status{margin-top:10px;font-size:13px;color:rgba(255,255,255,.75)}
    code{background:rgba(255,255,255,.08);padding:2px 6px;border-radius:8px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Manage notifications</h1>
      <p id="intro">Loading your preferences…</p>

      <div class="row">
        <div class="panel">
          <label>Email</label>
          <div id="emailBox" style="font-weight:700;">—</div>

          <label style="margin-top:16px;">Topics</label>
          <label class="toggle">
            <input type="checkbox" id="t_campaigns" value="campaigns">
            <div><strong>New Campaigns</strong><div style="color:rgba(255,255,255,.70);font-size:13px;line-height:1.5;margin-top:2px;">Launches & openings.</div></div>
          </label>
          <label class="toggle">
            <input type="checkbox" id="t_shop" value="shop">
            <div><strong>Shop Drops</strong><div style="color:rgba(255,255,255,.70);font-size:13px;line-height:1.5;margin-top:2px;">New items.</div></div>
          </label>
          <label class="toggle">
            <input type="checkbox" id="t_codex" value="codex">
            <div><strong>New Codex Articles</strong><div style="color:rgba(255,255,255,.70);font-size:13px;line-height:1.5;margin-top:2px;">New posts & tools.</div></div>
          </label>

          <label for="frequency" style="margin-top:16px;">Frequency</label>
          <select id="frequency">
            <option value="as_happens">As things happen</option>
            <option value="daily_digest">Daily digest</option>
            <option value="weekly_digest">Weekly digest</option>
          </select>

          <div class="actions">
            <button class="btn gold" id="btnSave" type="button">Save changes</button>
            <button class="btn danger" id="btnUnsub" type="button">Unsubscribe</button>
          </div>

          <div class="status" id="status"></div>
        </div>

        <div class="panel">
          <p><strong>How this page works</strong></p>
          <p>This link is private to you. If you didn’t expect this email, you can unsubscribe immediately.</p>
          <p class="status">If you see <code>Missing token</code>, open this page from the preferences link we send.</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const qs = new URLSearchParams(location.search);
    const token = qs.get('token');

    const $ = (id) => document.getElementById(id);
    const statusEl = $("status");

    function setStatus(msg){ statusEl.textContent = msg || ""; }

    function selectedTopics(){
      const topics = [];
      if ($("t_campaigns").checked) topics.push("campaigns");
      if ($("t_shop").checked) topics.push("shop");
      if ($("t_codex").checked) topics.push("codex");
      return topics;
    }

    async function load(){
      if (!token) {
        $("intro").textContent = "Missing token. Please use the preferences link from an Astral Forge email.";
        setStatus("Missing token.");
        return;
      }

      const res = await fetch(`/api/notify/manage?token=${encodeURIComponent(token)}`, { method: "GET" });
      const data = await res.json().catch(() => ({}));

      if (!res.ok || !data.ok) {
        $("intro").textContent = "We couldn’t load your preferences.";
        setStatus(data.error || `Error (${res.status})`);
        return;
      }

      const sub = data.subscriber;
      $("intro").textContent = "Update your topics and frequency below.";
      $("emailBox").textContent = sub.email || "—";

      const topics = new Set(sub.topics || []);
      $("t_campaigns").checked = topics.has("campaigns");
      $("t_shop").checked = topics.has("shop");
      $("t_codex").checked = topics.has("codex");
      $("frequency").value = sub.frequency || "as_happens";

      setStatus("");
    }

    $("btnSave").addEventListener("click", async () => {
      if (!token) return;

      const topics = selectedTopics();
      if (!topics.length) {
        setStatus("Pick at least one topic.");
        return;
      }

      setStatus("Saving…");

      // Requires Worker endpoint: POST /api/notify/update
      const body = new URLSearchParams();
      body.set("token", token);
      topics.forEach(t => body.append("topics[]", t));
      body.set("frequency", $("frequency").value);

      const res = await fetch("/api/notify/update", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body
      });

      const data = await res.json().catch(() => ({}));
      if (!res.ok || !data.ok) {
        setStatus(data.error || `Save failed (${res.status})`);
        return;
      }
      setStatus("Saved.");
    });

    $("btnUnsub").addEventListener("click", async () => {
      if (!token) return;
      if (!confirm("Unsubscribe from all Astral Forge notifications?")) return;

      setStatus("Unsubscribing…");

      // Requires Worker endpoint: POST /api/notify/unsubscribe
      const body = new URLSearchParams();
      body.set("token", token);

      const res = await fetch("/api/notify/unsubscribe", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body
      });

      const data = await res.json().catch(() => ({}));
      if (!res.ok || !data.ok) {
        setStatus(data.error || `Unsubscribe failed (${res.status})`);
        return;
      }

      location.href = "/membership/unsubscribed/";
    });

    load();
  </script>
</body>
</html>
