<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login • Astral Forge</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
--bg:#0b0b0d;
--text:rgba(255,255,255,.92);
--muted:rgba(255,255,255,.65);
--border:rgba(255,255,255,.10);
--gold:#b99054;
--panel:rgba(0,0,0,.45);
--radius:16px;
}

*{box-sizing:border-box}

body{
margin:0;
background:var(--bg);
font-family:Inter,system-ui,Segoe UI,Roboto,Arial,sans-serif;
color:var(--text);
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
padding:24px;
}

.container{
width:100%;
max-width:520px;
background:var(--panel);
border:1px solid var(--border);
border-radius:var(--radius);
padding:32px;
box-shadow:0 30px 80px rgba(0,0,0,.65);
}

.brand{
display:flex;
align-items:center;
gap:10px;
margin-bottom:20px;
}

.brand img{
height:34px;
}

.brand span{
font-family:'Cinzel',serif;
letter-spacing:.12em;
font-size:14px;
text-transform:uppercase;
}

h1{
margin:0 0 10px;
font-family:Georgia,serif;
font-size:34px;
}

.sub{
color:var(--muted);
font-size:14px;
margin-bottom:22px;
line-height:1.6;
}

label{
display:block;
font-size:12px;
font-weight:600;
margin-top:14px;
margin-bottom:6px;
}

input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid var(--border);
background:rgba(255,255,255,.06);
color:#fff;
outline:none;
}

input:focus{
border-color:var(--gold);
}

.actions{
margin-top:20px;
display:flex;
gap:10px;
align-items:center;
flex-wrap:wrap;
}

button{
background:linear-gradient(135deg,rgba(185,144,84,.35),rgba(0,0,0,.2));
border:1px solid rgba(185,144,84,.6);
color:white;
padding:12px 16px;
border-radius:12px;
font-weight:600;
cursor:pointer;
transition:.18s ease;
}

button:hover{
transform:translateY(-1px);
}

.signup{
font-size:13px;
color:var(--muted);
}

.signup a{
color:white;
text-decoration:none;
}

.forgot{
margin-top:14px;
font-size:12px;
}

.forgot a{
color:var(--muted);
text-decoration:none;
}

.footer{
margin-top:24px;
font-size:12px;
color:var(--muted);
line-height:1.6;
}

@media(max-width:560px){

.actions{
flex-direction:column;
align-items:flex-start;
}

button{
width:100%;
}

}
</style>
</head>

<body>

<div class="container">

<div class="brand">
<img src="/assets/nav/Astral-Forge-nav.png" alt="Astral Forge logo">
<span>Astral Forge</span>
</div>

<h1>Login</h1>

<p class="sub">
Access your Astral Forge account to manage your Forge Pass,
campaign access, and Codex tools.
</p>

<form method="post" action="/api/auth/login">

<label for="email">Email</label>
<input id="email" type="email" name="email" required placeholder="you@domain.com" autocomplete="email">

<label for="password">Password</label>
<input id="password" type="password" name="password" required placeholder="Your password" autocomplete="current-password">

<div class="actions">

<button type="submit">
Login →
</button>

<div class="signup">
Need an account? <a href="https://astralforge.studio/signup/">Create one</a>
</div>

</div>

<div class="forgot">
<a href="/forgot/">Forgot password?</a>
</div>

</form>

<div class="footer">
By logging in you agree to the
<a href="https://astralforge.studio/legal/terms/">Terms</a> and
<a href="https://astralforge.studio/legal/privacy/">Privacy Policy</a>.
</div>

</div>

</body>
</html>
