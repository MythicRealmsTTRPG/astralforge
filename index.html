<script>
  document.addEventListener("DOMContentLoaded", () => {
    const defaultAuthState = {
      isLoggedIn: false,
      user: {
        name: "Account",
        email: "",
        avatar: "/assets/ui/default-avatar.png"
      }
    };

    const authState = {
      ...defaultAuthState,
      ...(window.ASTRAL_FORGE_AUTH || {}),
      user: {
        ...defaultAuthState.user,
        ...((window.ASTRAL_FORGE_AUTH && window.ASTRAL_FORGE_AUTH.user) || {})
      }
    };

    const loggedOutNav = document.getElementById("loggedOutNav");
    const userMenu = document.getElementById("userMenu");
    const userMenuToggle = document.getElementById("userMenuToggle");
    const userDropdown = document.getElementById("userDropdown");
    const userName = document.getElementById("userName");
    const userAvatar = document.getElementById("userAvatar");
    const dropdownDisplayName = document.getElementById("dropdownDisplayName");
    const dropdownEmail = document.getElementById("dropdownEmail");
    const logoutBtn = document.getElementById("logoutBtn");

    const heroLoggedOut = document.getElementById("heroLoggedOut");
    const heroLoggedIn = document.getElementById("heroLoggedIn");
    const featuredJoinBtn = document.getElementById("featuredJoinBtn");

    const loginModal = document.getElementById("loginModal");
    const openLoginModalBtn = document.getElementById("openLoginModal");
    const heroLoginBtn = document.getElementById("heroLoginBtn");
    const closeLoginModalBtn = document.getElementById("closeLoginModal");

    function applyAuthState() {
      if (authState.isLoggedIn) {
        loggedOutNav.classList.add("hidden");
        userMenu.classList.remove("hidden");
        heroLoggedOut.classList.add("hidden");
        heroLoggedIn.classList.remove("hidden");

        const displayName = authState.user?.name || "Account";
        const email = authState.user?.email || "";
        const avatar = authState.user?.avatar || "/assets/ui/default-avatar.png";

        userName.textContent = displayName;
        dropdownDisplayName.textContent = displayName;
        dropdownEmail.textContent = email || "Signed in";
        userAvatar.src = avatar;
        userAvatar.alt = displayName + " avatar";

        if (featuredJoinBtn) {
          featuredJoinBtn.textContent = "Dashboard";
          featuredJoinBtn.href = "https://accounts.astralforge.studio";
        }
      } else {
        loggedOutNav.classList.remove("hidden");
        userMenu.classList.add("hidden");
        heroLoggedOut.classList.remove("hidden");
        heroLoggedIn.classList.add("hidden");

        userName.textContent = "Account";
        dropdownDisplayName.textContent = "Account";
        dropdownEmail.textContent = "Signed in";
        userAvatar.src = "/assets/ui/default-avatar.png";
        userAvatar.alt = "Account avatar";

        if (featuredJoinBtn) {
          featuredJoinBtn.textContent = "Forge Pass";
          featuredJoinBtn.href = "https://accounts.astralforge.studio/create-profile/?return=%2F";
        }

        closeDropdown();
      }
    }

    function closeDropdown() {
      if (!userDropdown || !userMenuToggle) return;
      userDropdown.classList.add("hidden");
      userMenuToggle.setAttribute("aria-expanded", "false");
    }

    function openDropdown() {
      if (!userDropdown || !userMenuToggle) return;
      userDropdown.classList.remove("hidden");
      userMenuToggle.setAttribute("aria-expanded", "true");
    }

    function openLoginModal() {
      if (!loginModal) return;
      loginModal.classList.remove("hidden");
      loginModal.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }

    function closeLoginModal() {
      if (!loginModal) return;
      loginModal.classList.add("hidden");
      loginModal.setAttribute("aria-hidden", "true");
      document.body.style.overflow = "";
    }

    if (openLoginModalBtn) {
      openLoginModalBtn.addEventListener("click", openLoginModal);
    }

    if (heroLoginBtn) {
      heroLoginBtn.addEventListener("click", openLoginModal);
    }

    if (closeLoginModalBtn) {
      closeLoginModalBtn.addEventListener("click", closeLoginModal);
    }

    if (loginModal) {
      loginModal.addEventListener("click", (event) => {
        if (event.target === loginModal) {
          closeLoginModal();
        }
      });
    }

    if (userMenuToggle) {
      userMenuToggle.addEventListener("click", (event) => {
        event.stopPropagation();
        const isOpen = !userDropdown.classList.contains("hidden");

        if (isOpen) {
          closeDropdown();
        } else {
          openDropdown();
        }
      });
    }

    if (userDropdown) {
      userDropdown.addEventListener("click", (event) => {
        event.stopPropagation();
      });
    }

    document.addEventListener("click", () => {
      closeDropdown();
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeDropdown();
        closeLoginModal();
      }
    });

    if (logoutBtn) {
      logoutBtn.addEventListener("click", async () => {
        try {
          await fetch("https://accounts.astralforge.studio/api/auth/logout", {
            method: "POST",
            credentials: "include"
          });
        } catch (error) {
          console.error("Logout failed:", error);
        }

        window.location.href = "/";
      });
    }

    applyAuthState();
  });
</script>
